name: Continuous Integration

on:
    push:
        branches:
            - main
        paths-ignore:
            - "**.md"
            - "renovate.json"
            - ".github/ISSUE_TEMPLATE/**"
            - ".github/PULL_REQUEST_TEMPLATE/**"
            - ".github/workflows/docs.yml"
            - ".github/workflows/release.yml"
    
    pull_request:
        paths-ignore:
            - "**.md"
            - "renovate.json"
            - ".github/ISSUE_TEMPLATE/**"
            - ".github/PULL_REQUEST_TEMPLATE/**"
            - ".github/workflows/docs.yml"
            - ".github/workflows/release.yml"
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test-and-analysis:
        name: Test & Analysis
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
        env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            SONAR_ANALYSIS: true
        
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0
                  show-progress: false

            - name: Setup .NET
              uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
              with:
                  global-json-file: global.json
                  cache: true
                  cache-dependency-path: '**/Directory.Packages.props'

            - name: Restore dependencies
              run: dotnet restore

            - name: Install SonarCloud scanner
              if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
              run: dotnet tool update dotnet-sonarscanner --tool-path .sonar/scanner

            - name: Install dotnet-coverage tool
              if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
              run: dotnet tool update dotnet-coverage --global

            - name: Begin SonarCloud analysis
              if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
              run: |
                  .sonar/scanner/dotnet-sonarscanner begin \
                    /k:"visus:AddressValidation" \
                    /o:"visus" \
                    /d:sonar.token="$SONAR_TOKEN" \
                    /d:sonar.host.url="https://sonarcloud.io" \
                    /d:sonar.projectBaseDir="${GITHUB_WORKSPACE}" \
                    /d:sonar.cs.vscoveragexml.reportsPaths="coverage.xml" \
                    /d:sonar.cs.vstest.reportsPaths="**/TestResults/**/*.trx"

            - name: Build
              run: dotnet build -c Release --no-restore

            - name: Run tests
              run: |
                  dotnet test -c Release --no-build --no-restore -- \
                    --coverage \
                    --coverage-output-format xml \
                    --report-trx

            - name: Merge coverage reports
              if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
              run: |
                  dotnet-coverage merge "tests/**/TestResults/*.xml" \
                    --output coverage.xml \
                    --output-format xml

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: test-results
                  path: "**/TestResults/*.trx"
                  retention-days: 1

            - name: End SonarCloud analysis
              if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
              run: |
                  .sonar/scanner/dotnet-sonarscanner end \
                    /d:sonar.token="$SONAR_TOKEN"
    
    publish-test-results:
        name: Publish Test Results
        runs-on: ubuntu-latest
        needs: test-and-analysis
        if: always()
        timeout-minutes: 10
        permissions:
            contents: read
            checks: write
            pull-requests: write
        
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 1
                  show-progress: false

            - name: Download test results
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: test-results
                  path: test-results

            - name: Publish test results
              uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2.7.0
              with:
                  name: Test Results
                  path: test-results/**/*.trx
                  reporter: dotnet-trx
                  fail-on-error: false
