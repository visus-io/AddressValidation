name: Rebase l10n Branch

on:
    push:
        branches:
            - main
    schedule:
        -   cron: '17 6 * * *'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false

jobs:
    rebase:
        name: Rebase l10n onto main
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: write
            pull-requests: write

        steps:
            -   name: Checkout
                uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
                with:
                    fetch-depth: 0
                    show-progress: false

            -   name: Check l10n branch exists
                id: branch-check
                run: |
                    if git ls-remote --exit-code --heads origin l10n > /dev/null 2>&1; then
                        echo "exists=true" >> "${GITHUB_OUTPUT}"
                    else
                        echo "exists=false" >> "${GITHUB_OUTPUT}"
                    fi

            -   name: Check whether rebase is needed
                if: steps.branch-check.outputs.exists == 'true'
                id: drift-check
                run: |
                    COUNT=$(git rev-list --count origin/l10n..origin/main)
                    echo "commits-behind=${COUNT}" >> "${GITHUB_OUTPUT}"

            -   name: Rebase and open pull request
                if: steps.branch-check.outputs.exists == 'true' && steps.drift-check.outputs.commits-behind != '0'
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run: |
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                    git checkout -b l10n origin/l10n

                    if ! git rebase origin/main; then
                        git rebase --abort
                        echo "::error::Rebase of l10n onto main failed due to conflicts. Manual intervention required."
                        exit 1
                    fi

                    git push --force origin l10n:l10n-rebase

                    EXISTING_PR=$(gh pr list --repo "${GITHUB_REPOSITORY}" --base l10n --head l10n-rebase --state open --json number --jq '.[0].number')

                    if [ -n "${EXISTING_PR}" ]; then
                        echo "Pull request #${EXISTING_PR} already open for l10n-rebase -> l10n; branch updated in place."
                    else
                        gh pr create --repo "${GITHUB_REPOSITORY}" \
                            --base l10n \
                            --head l10n-rebase \
                            --title "chore(l10n): rebase onto main" \
                            --reviewer visus-io/project-administrators \
                            --assignee visus-io/project-administrators \
                            --body "Automated rebase of \`l10n\` onto \`main\`."
                    fi
