name: Release

on:
    push:
        tags:
            - 'v[0-9]+.[0-9]+.[0-9]+'
            - 'v[0-9]+.[0-9]+.[0-9]+-*'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    pack:
        name: Pack
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
        outputs:
            version: ${{ steps.minver.outputs.version }}

        steps:
            -   name: Checkout
                uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
                with:
                    fetch-depth: 0
                    show-progress: false

            -   name: Setup .NET
                uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
                with:
                    global-json-file: global.json
                    cache: true
                    cache-dependency-path: '**/packages.lock.json'

            -   name: Install MinVer CLI
                run: dotnet tool install --global minver-cli

            -   name: Determine version
                id: minver
                run: |
                    VERSION=$(minver -v e -b ${{ github.run_number }})
                    echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

            -   name: Restore dependencies
                run: dotnet restore

            -   name: Build
                run: dotnet build -c Release --no-restore -p:ContinuousIntegrationBuild=true -p:MinVerBuildMetadata=${{ github.run_number }}

            -   name: Pack
                run: |
                    dotnet pack -c Release --no-build --no-restore \
                      -p:ContinuousIntegrationBuild=true \
                      -p:MinVerBuildMetadata=${{ github.run_number }} \
                      --output ${{ runner.temp }}/nupkgs

            -   name: Upload packages
                uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
                with:
                    name: nupkgs
                    path: ${{ runner.temp }}/nupkgs/*.nupkg
                    retention-days: 7
                    if-no-files-found: error

    publish:
        name: Publish
        runs-on: ubuntu-latest
        needs: pack
        timeout-minutes: 10
        environment: nuget-publish
        permissions:
            id-token: write

        steps:
            -   name: Download packages
                uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
                with:
                    name: nupkgs
                    path: ./nupkgs

            -   name: Setup .NET
                uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
                with:
                    global-json-file: global.json

            -   name: NuGet login
                uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
                id: nuget-login
                with:
                    user: ${{ secrets.NUGET_USERNAME }}

            -   name: Push packages
                run: |
                    dotnet nuget push "nupkgs/*.nupkg" \
                      --source https://api.nuget.org/v3/index.json \
                      --skip-duplicate
                env:
                    NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}

            -   name: Generate job summary
                if: success()
                run: |
                    echo "## Release Published" >> "${GITHUB_STEP_SUMMARY}"
                    echo "" >> "${GITHUB_STEP_SUMMARY}"
                    echo "**Version:** ${{ needs.pack.outputs.version }}" >> "${GITHUB_STEP_SUMMARY}"
                    echo "" >> "${GITHUB_STEP_SUMMARY}"
                    echo "### Published Packages" >> "${GITHUB_STEP_SUMMARY}"
                    for f in nupkgs/*.nupkg; do
                        echo "- \`$(basename "$f")\`" >> "${GITHUB_STEP_SUMMARY}"
                    done
