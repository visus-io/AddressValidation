name: Feature Request
description: Suggest a new feature or enhancement for the library
title: '[Feature]: '
labels: ['Status: Review Needed', 'Priority: Low']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Affected Area(s)
      multiple: true
      options:
        - Core Abstractions
        - Validation Pipeline
        - Authentication / Token Caching
        - HTTP Resilience
        - DI Registration
        - FedEx Integration
        - Google Integration
        - Pitney Bowes Integration
        - UPS Integration
        - New Provider Integration
        - Source Generator
        - AOT / Trim Compatibility
        - Other
    validations:
      required: false

  - type: textarea
    id: example
    attributes:
      label: Example Usage
      description: Show how you'd like to use this feature
      render: csharp
      placeholder: |
        services.AddHybridCache();
        services.AddFedExAddressValidation(configuration);

        // Your proposed API usage here
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important for my use case
        - Critical blocker
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or examples
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this feature hasn't been requested already
          required: true
        - label: I am willing to contribute this feature via a pull request
          required: false
