preserve_hierarchy: true

files:
  - source: "/src/**/Resources/Resources.resx"
    translation: "/src/**/Resources/Resources.%locale%.resx"
    export_only_approved: true
    languages_mapping:
      locale:
        de: "de-DE"
        es-ES: "es-ES"
        fr: "fr-FR"
        it: "it-IT"
        pt-BR: "pt-BR"
        pt-PT: "pt-PT"

pull_request_title: "chore(l10n): new translations"

pull_request_labels:
  - "Maintenance: Translations"

commit_message: "chore(l10n): new translations %original_file_name% (%language%)"
append_commit_message: false
signoff_commit: true

pull_request_assignees:
  - "visus-io/project-administrators"

pull_request_reviewers:
  - "visus-io/project-administrators"
